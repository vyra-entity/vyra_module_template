# Alembic migration environment — {{ module_name }}
#
# This file is rendered by copier when a new module is created from the template.
#
# Usage (inside container or with proper PYTHONPATH):
#   alembic upgrade head           # apply all migrations
#   alembic downgrade -1           # roll back one revision
#   alembic revision -m "my msg"   # create a new migration script
#   alembic current                # show current revision
#
# The database URL is resolved in this priority order:
#   1. DATABASE_URL  environment variable
#   2. /workspace/storage/{{ module_name }}.sqlite  (container default)

[alembic]
script_location = alembic
prepend_sys_path = .
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = UTC
truncate_slug_length = 40
revision_environment = false
sourceless = false
version_locations = alembic/versions

sqlalchemy.url = sqlite:////workspace/storage/{{ module_name }}.sqlite

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
