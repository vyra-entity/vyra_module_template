_subdirectory: "."
_answers_file: ".copier-answers.yml"
_skip_if_exists: []
_jinja_extension: jinja2.ext.do
_templates_suffix: ""

# === Pflichtfelder ===

module_name:
  type: str
  help: "Modul-Name (snake_case, z.B. my_detector)"
  validator: "{% if not (module_name | regex_search('^[a-z][a-z0-9_]*$')) %}Nur Kleinbuchstaben, Zahlen und Unterstriche erlaubt{% endif %}"

module_display_name:
  type: str
  help: "Anzeigename (z.B. My Detector Module)"
  default: "{{ module_name | replace('_', ' ') | title }}"

module_description:
  type: str
  help: "Kurze Beschreibung des Moduls (für README und metadata)"

module_version:
  type: str
  help: "Benutze Semantic Versioning (z.B. 0.1.0) [Major.Minor.Patch] - Kein Build-Metadaten oder Prä-Release-Tags"
  default: "0.0.0"
  validator: "{% if not (module_version | regex_search('^\\d+\\.\\d+\\.\\d+$')) %}Version muss im Format X.Y.Z sein (z.B. 0.1.0){% endif %}"

module_template:
  type: str
  help: "Welches Template soll als Basis verwendet werden?"
  validator: "{% if not (module_template | regex_search('^[a-z][a-z0-9_]*$')) %}Nur Kleinbuchstaben, Zahlen und Unterstriche erlaubt{% endif %}"

author_name:
  type: str
  help: "Dein Name"

author_email:
  type: str
  help: "Deine E-Mail-Adresse"
  validator: "{% if not (author_email | regex_search('^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$')) %}Ungültige E-Mail-Adresse{% endif %}"

# === Optionale Feature-Flags ===

enable_frontend:
  type: bool
  help: "Soll ein Webinterface eingebunden werden?"
  default: true

enable_dev_mode:
  type: bool
  help: "Soll im Entwicklungsmodus gestartet werden? (Vite - Frontend Dev Server + Hot-Reload)"
  default: true

enable_slim_mode:
  type: bool
  help: "Soll der Slim-Modus als Standard gesetzt werden? (ohne ROS2, nur Python - ideal für ressourcenbeschränkte Module)"
  default: false

build_after_copy:
  type: bool
  help: "Soll das Docker-Image nach dem Erstellen automatisch gebaut werden? (beide Varianten: development + production)"
  default: true

publish_to_repo_after_copy:
  type: bool
  help: "Soll das Modul nach dem Bauen automatisch ins lokale Repository geladen werden?"
  default: true

# === Interne/abgeleitete Variablen (keine Abfrage) ===
# Nutzung in Templates:
# {{ module_name }}                           → my_detector
# {{ module_display_name }}                   → My Detector Module
# {{ module_name | replace('_', '-') }}       → my-detector  (entrypoint name)
# {{ module_name | title | replace('_','') }} → MyDetector   (Klassenname)

# docs und examples sollen in das neue modul mit übernommen werden, damit man
# dort direkt loslegen kann. Daher werden sie nicht ausgeschlossen, sondern 
# als Hilfe für die Nutzer bereitgestellt. In der .gitignore des Moduls werden 
# sie dann ausgeschlossen, damit sie nicht ins Repository gelangen.


_exclude:
  - "{% if not enable_frontend %}frontend/**{% endif %}"
  - "{% if not enable_frontend %}config/nginx.conf{% endif %}"
  - "{% if not enable_frontend %}src/{{ module_name }}/{{ module_name }}/backend_webserver/**{% endif %}"
  - "copier.yml"
  - ".git"
  - ".git/**"
  - ".github/**"
  - "build/**"
  - "install/**"
  - "log/**"
  - "*.pyc"
  - "__pycache__"

_tasks:
  - "cp .env.example .env"
  - "chmod +x tools/*.sh"
  - "echo '✅ Modul {{ module_name }} wurde erstellt!'"
  - "echo '📦 Zum Publishen ins Repository: ./tools/publish_to_repo.sh'"
  - "{% if build_after_copy %}cd ../.. && ./tools/quick_rebuild_module.sh {{ module_name }} --all-variants || echo '⚠️  Build fehlgeschlagen. Manuell bauen: cd VOS2_WORKSPACE && ./tools/quick_rebuild_module.sh {{ module_name }} --all-variants'{% else %}echo '⏭️  Build übersprungen. Zum Bauen: cd VOS2_WORKSPACE && ./tools/quick_rebuild_module.sh {{ module_name }} --all-variants'{% endif %}"
  - "{% if publish_to_repo_after_copy %}bash tools/publish_to_repo.sh || echo '⚠️  Repository-Publish fehlgeschlagen. Details siehe oben.'{% else %}echo '⏭️  Repository-Publish übersprungen. Zum Publizieren: ./tools/publish_to_repo.sh'{% endif %}"
